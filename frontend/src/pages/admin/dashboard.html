<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AutoPark Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
</head>

<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white">
    <nav class="bg-slate-900 border-b border-slate-800">

        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

            <div class="flex items-center gap-8">

                <h1 class="text-xl font-bold text-blue-400">
                    AutoPark Admin
                </h1>

                <a href="./suscriptions.html" class="text-slate-300 hover:text-white transition">

                    Subscriptions
                </a>

                <a href="./hourlyParking.html" class="text-slate-300 hover:text-white transition">

                    Hourly Parking
                </a>

            </div>

            <a href="../../../public/index.html" class="text-blue-400 hover:text-blue-300 text-sm">

                ← Back to Home

            </a>

        </div>

    </nav>
    <div class="max-w-7xl mx-auto p-6 flex justify-between">

    </div>

    <section class="max-w-7xl mx-auto px-6 grid md:grid-cols-3 gap-6 mb-16">

        <div data-aos="fade-up" class="bg-slate-900 p-6 rounded-xl">
            <p class="text-slate-400 text-sm">Vehicles Parked</p>
            <p class="text-3xl font-bold">24</p>
        </div>

        <div data-aos="fade-up" data-aos-delay="200" class="bg-slate-900 p-6 rounded-xl">
            <p class="text-slate-400 text-sm">Subscriptions</p>
            <p class="text-3xl font-bold">12</p>
        </div>

        <div data-aos="fade-up" data-aos-delay="400" class="bg-slate-900 p-6 rounded-xl">
            <p class="text-slate-400 text-sm">Revenue Today</p>
            <p class="text-3xl font-bold text-green-400">$1200</p>
        </div>

    </section>

    <section class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-10">

        <div data-aos="fade-up" class="bg-slate-900 p-8 rounded-xl">
            <h2 class="text-xl mb-6 font-bold">Revenue Per Hour</h2>
            <canvas id="revenueChart"></canvas>
        </div>

        <div data-aos="fade-up" data-aos-delay="200" class="bg-slate-900 p-8 rounded-xl">
            <h2 class="text-xl mb-6 font-bold">Subscription Distribution</h2>
            <canvas id="subscriptionChart"></canvas>
        </div>

    </section>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>

        AOS.init({ duration: 900 })

        new Chart(document.getElementById("revenueChart"), {
            type: "line",
            data: {
                labels: ["8am", "10am", "12pm", "2pm", "4pm", "6pm"],
                datasets: [{
                    label: "Revenue",
                    data: [200, 350, 500, 300, 700, 1200],
                    borderColor: "#3b82f6",
                    backgroundColor: "#3b82f644"
                }]
            }
        })

        new Chart(document.getElementById("subscriptionChart"), {
            type: "doughnut",
            data: {
                labels: ["Cars", "Motorcycles"],
                datasets: [{
                    data: [12, 4],
                    backgroundColor: ["#3b82f6", "#22c55e"]
                }]
            }
        })

    </script>

</body>

</html>

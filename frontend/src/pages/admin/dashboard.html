<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AutoPark Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
    <link rel="stylesheet" href="../../styles/dashboard.css">
</head>

<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-slate-900 border-b border-slate-800">

        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

            <div class="flex items-center gap-8">

                <h1 class="text-xl font-bold text-blue-400">
                    AutoPark Admin
                </h1>

                <a href="./suscriptions.html" class="text-slate-300 hover:text-white transition">

                    Subscriptions
                </a>

                <a href="./hourlyParking.html" class="text-slate-300 hover:text-white transition">

                    Hourly Parking
                </a>

            </div>

            <a href="../../../../index.html" class="text-blue-400 hover:text-blue-300 text-sm">

                ← Back to Home

            </a>

        </div>

    </nav>

    <div class="max-w-7xl mx-auto p-6 flex justify-between">

    </div>

    <!-- SECTION DATA -->

    <section class="max-w-7xl mx-auto px-6 grid md:grid-cols-3 gap-6 mb-16">

        <div data-aos="fade-up" class="bg-slate-900 p-6 rounded-xl">
            <p class="text-slate-400 text-sm">Vehicles Parked</p>
            <p class="text-3xl font-bold" id="vehiclesParked">24</p>
        </div>

        <div data-aos="fade-up" data-aos-delay="200" class="bg-slate-900 p-6 rounded-xl">
            <p class="text-slate-400 text-sm">Subscriptions</p>
            <p class="text-3xl font-bold" id="totalSuscriptions">12</p>
        </div>

        <div data-aos="fade-up" data-aos-delay="400" class="bg-slate-900 p-6 rounded-xl">
            <p class="text-slate-400 text-sm">Revenue Today</p>
            <p class="text-3xl font-bold text-green-400" id="revenueToday">$1200</p>
        </div>

    </section>


    <!-- VIDEO SECTION -->
    <section>
        <div class="w-full flex justify-center mt-10">

            <div class="bg-slate-900 border border-slate-800 rounded-2xl shadow-xl p-6 w-full max-w-2xl">

          
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-white font-semibold text-lg">
                        Parking camera monitor
                    </h3>

                    <span class="flex items-center gap-2 text-green-400 text-sm">
                        <span class="w-2.5 h-2.5 bg-green-400 rounded-full animate-pulse"></span>
                        Live
                    </span>
                </div>

              
                <div class="overflow-hidden rounded-xl border border-slate-800 mb-4">
                    <video id="parkingVideo" class="w-full h-[260px] object-cover bg-black" autoplay muted loop
                        controls>
                        <source src="video/default.mp4" type="video/mp4">
                    </video>
                </div>


             
                <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 text-center">
                    <p class="text-slate-400 text-sm mb-1">
                        Plate detected
                    </p>

                    <span id="plateDisplay" class="text-white text-2xl tracking-widest font-mono">
                        --- ---
                    </span>
                </div>

            </div>

        </div>
    </section>



    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script type="module" src="../../scripts/main.js"></script>

    <script>
        AOS.init({ duration: 900 })
    </script>

</body>

</html>

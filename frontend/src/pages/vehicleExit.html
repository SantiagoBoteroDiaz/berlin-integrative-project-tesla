<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vehicle Exit</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />

</head>


<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white min-h-screen flex flex-col">

    <!-- BACK BUTTON -->

    <div class="max-w-7xl mx-auto w-full px-6 py-6">

        <a href="../../../index.html" class="text-blue-400 hover:text-blue-300 text-sm transition">

            ← Back to Home

        </a>

    </div>



    <!-- MAIN CONTENT -->

    <section class="flex flex-1 items-center justify-center px-4 md:px-6">

        <div data-aos="zoom-in"
            class="bg-slate-900 border border-slate-800 shadow-2xl p-8 md:p-12 rounded-3xl w-full max-w-md text-center transition hover:scale-[1.02]">




            <!-- ICON -->

            <div data-aos="fade-down" data-aos-delay="200" class="flex justify-center mb-6">

                <div class="bg-blue-500/20 p-4 rounded-full text-2xl">

                    🚗

                </div>

            </div>



            <h1 data-aos="fade-up" data-aos-delay="300" class="text-2xl md:text-3xl font-bold mb-3">

                Vehicle Exit

            </h1>


            <p data-aos="fade-up" data-aos-delay="400" class="text-slate-400 mb-8 text-sm">

                Enter your license plate to calculate your parking payment.

            </p>



            <!-- INPUT -->

            <input id="plate_input" data-aos="fade-up" data-aos-delay="500" type="text" placeholder="ABC123"
                autocomplete="off"
                class="w-full p-4 text-center tracking-widest text-lg rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-6" 
            />

            <div id="menssage_error">
                

            </div>

            <!-- BUTTON -->

            <button id="bnt_exit" data-aos="fade-up" data-aos-delay="600"
                class="w-full bg-blue-500 hover:bg-blue-600 py-4 rounded-xl font-semibold text-lg transition">

                Calculate Payment

            </button>

        </div>

    </section>



    <!-- SCRIPTS -->

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script type="module" src="../scripts/main.js"></script>

    <script>

        AOS.init({
            duration: 900,
            once: true
        });

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Vehicle Exit</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />

</head>


<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white min-h-screen">

    <!-- BACK BUTTON -->

    <div class="max-w-7xl mx-auto p-6">

        <a href="../../public/index.html" class="text-blue-400 hover:text-blue-300 text-sm">

            ← Back to Home

        </a>

    </div>



    <section class="flex items-center justify-center px-6 h-[80vh]">

        <div data-aos="zoom-in"
            class="bg-slate-900 border border-slate-800 shadow-2xl p-12 rounded-3xl w-full max-w-md text-center transition hover:scale-[1.02]">



            <!-- ICON -->

            <div data-aos="fade-down" data-aos-delay="200" class="flex justify-center mb-6">

                <div class="bg-blue-500/20 p-4 rounded-full text-2xl">

                    🚗

                </div>

            </div>



            <h1 data-aos="fade-up" data-aos-delay="300" class="text-3xl font-bold mb-3">

                Vehicle Exit

            </h1>


            <p data-aos="fade-up" data-aos-delay="400" class="text-slate-400 mb-8 text-sm">

                Enter your license plate to calculate your parking payment.

            </p>



            <!-- INPUT -->

            <input id="plate" data-aos="fade-up" data-aos-delay="500" type="text" placeholder="ABC123"
                class="w-full p-4 text-center tracking-widest text-lg rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-6" />



            <!-- BUTTON -->

            <button data-aos="fade-up" data-aos-delay="600" onclick="calculatePayment()"
                class="w-full bg-blue-500 hover:bg-blue-600 py-4 rounded-xl font-semibold text-lg transition">

                Calculate Payment

            </button>



            <!-- LOADER -->

            <div id="loader" class="hidden mt-6 flex justify-center">

                <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent"></div>

            </div>



            <!-- RESULT CARD -->

            <div id="resultCard" class="hidden mt-8 bg-slate-800 p-6 rounded-xl border border-slate-700">

                <p class="text-slate-400 text-sm mb-2">
                    Total Payment
                </p>

                <p id="amount" class="text-3xl font-bold text-green-400">

                    $0

                </p>

                <p class="text-slate-400 text-xs mt-2">
                    You will have 15 minutes to exit after payment.
                </p>

            </div>



        </div>

    </section>



    <!-- SCRIPTS -->

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 900,
            once: true
        });
    </script>

</body>

</html>

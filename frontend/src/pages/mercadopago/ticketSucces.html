<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Completed</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0B1220] flex items-center justify-center min-h-screen text-white">

<div class="bg-slate-900 p-10 rounded-2xl shadow-xl text-center w-[380px]">

    <div class="text-green-400 text-6xl mb-4">👍</div>

    <h1 class="text-2xl font-bold mb-2">Payment Completed</h1>
    <p class="text-slate-400 mb-6">
        Your parking payment was processed successfully.
    </p>

    <!-- receipt info -->
    <div class="bg-slate-800 rounded-xl p-4 mb-4">
        <p class="text-sm text-slate-400">Vehicle Plate</p>
        <p id="plateText"
           class="text-lg tracking-widest font-semibold"></p>
    </div>

    <div class="p-4 mb-6">
        <p class="text-sm text-slate-400">
            You have <span class="text-green-400 font-semibold">15 minutes</span>
            to leave the parking lot
        </p>
    </div>

    <button onclick="goHome()"
        class="bg-green-500 hover:bg-green-600 w-full py-3 rounded-xl font-semibold transition">
        Back to Home
    </button>

</div>

<script>
    function goHome(){
        window.location.href = "../../../../index.html";
    }
</script>

</body>
</html>
